name: CI

on:
  push:
    branches: [main, 'release-please--**']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - node-version: 20
            prettier-version: '3.0.0'
            latest-prettier: false
          - node-version: 20
            prettier-version: '3'
            latest-prettier: true
          - node-version: 22
            prettier-version: '3.0.0'
            latest-prettier: false
          - node-version: 22
            prettier-version: '3'
            latest-prettier: true
          - node-version: 24
            prettier-version: '3'
            latest-prettier: true

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Prettier ${{ matrix.prettier-version }}
        if: ${{ !matrix.latest-prettier }}
        run: pnpm add -D prettier@${{ matrix.prettier-version }}

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Type check
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        if: ${{ !matrix.latest-prettier }}
        run: pnpm run test

      - name: Test with coverage
        if: ${{ matrix.latest-prettier }}
        run: pnpm run test:coverage

      - name: Upload coverage
        if: ${{ matrix.node-version == 22 && matrix.latest-prettier }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info

      - name: Publish dry-run
        if: ${{ matrix.node-version == 22 && matrix.latest-prettier }}
        run: pnpm publish --dry-run --no-git-checks

  bundle-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Report bundle sizes
        run: |
          echo "## Bundle sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "| ---- | ---- |" >> $GITHUB_STEP_SUMMARY
          for f in dist/index.mjs dist/index.cjs dist/sorter.mjs dist/sorter.cjs; do
            size=$(du -sh "$f" | cut -f1)
            echo "| \`$f\` | $size |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Enforce size limits
        run: |
          # index bundles must stay under 50 KB, sorter under 10 KB
          check() {
            local file=$1 limit=$2
            local bytes
            bytes=$(wc -c < "$file")
            if [ "$bytes" -gt "$limit" ]; then
              echo "ERROR: $file is ${bytes}B, exceeds limit of ${limit}B" >&2
              exit 1
            fi
          }
          check dist/index.mjs 51200
          check dist/index.cjs 51200
          check dist/sorter.mjs 10240
          check dist/sorter.cjs 10240
