name: CI

on:
  push:
    branches: [main, 'release-please--**']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
        prettier-version: ['3.0.0', '3']

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Prettier ${{ matrix.prettier-version }}
        if: matrix.prettier-version != '3'
        run: pnpm add -D prettier@${{ matrix.prettier-version }}

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Type check
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        if: matrix.prettier-version != '3'
        run: pnpm run test

      - name: Test with coverage
        if: matrix.prettier-version == '3'
        run: pnpm run test:coverage

      - name: Upload coverage
        if: matrix.node-version == 22 && matrix.prettier-version == '3'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info

      - name: Publish dry-run
        run: pnpm publish --dry-run --no-git-checks
