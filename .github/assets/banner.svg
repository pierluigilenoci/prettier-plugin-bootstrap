<svg xmlns="http://www.w3.org/2000/svg" width="900" height="160" viewBox="0 0 900 160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7952b3"/>
      <stop offset="100%" stop-color="#563d7c"/>
    </linearGradient>
  </defs>
  <rect width="900" height="160" fill="url(#bg)" rx="12"/>
  <!-- Bootstrap B icon -->
  <text x="48" y="108" font-family="Georgia, serif" font-size="80" font-weight="700" fill="white" opacity="0.95">B</text>
  <!-- Plugin name -->
  <text x="120" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="white">prettier-plugin-bootstrap</text>
  <!-- Tagline -->
  <text x="122" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="white" opacity="0.85">Automatically sort Bootstrap CSS classes with Prettier</text>
</svg>
